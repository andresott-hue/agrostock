<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#25B57E"/>
      <stop offset="100%" stop-color="#178A5C"/>
    </linearGradient>
  </defs>
  
  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" ry="22" fill="url(#g)"/>
  
  <!-- Box/warehouse in center -->
  <rect x="32" y="38" width="36" height="28" rx="3" fill="none" stroke="white" stroke-width="3.5"/>
  <!-- Box top -->
  <polyline points="32,38 50,26 68,38" fill="none" stroke="white" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Box door -->
  <rect x="43" y="50" width="14" height="16" rx="2" fill="white" opacity="0.9"/>
  
  <!-- Arrow IN (left side, going right into box) -->
  <line x1="10" y1="52" x2="26" y2="52" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <polyline points="20,46 27,52 20,58" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Arrow OUT (right side, going right out of box) -->
  <line x1="74" y1="52" x2="90" y2="52" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <polyline points="84,46 91,52 84,58" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Small dot on arrow IN (green indicator) -->
  <circle cx="16" cy="52" r="4" fill="white" opacity="0.5"/>
  
  <!-- Text AS small -->
</svg>