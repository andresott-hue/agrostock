<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22B585"/>
      <stop offset="100%" stop-color="#1D9E75"/>
    </linearGradient>
    <clipPath id="clip">
      <rect width="100" height="100" rx="22" ry="22"/>
    </clipPath>
  </defs>
  <rect width="100" height="100" rx="22" ry="22" fill="url(#g)"/>
  <g clip-path="url(#clip)" fill="white">
    <!-- Center stalk -->
    <rect x="47.5" y="35" width="5" height="47" rx="2.5"/>
    <!-- Left branch -->
    <line x1="50" y1="55" x2="30" y2="42" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <!-- Right branch -->
    <line x1="50" y1="55" x2="70" y2="42" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <!-- Center grain -->
    <ellipse cx="50" cy="28" rx="9" ry="12"/>
    <!-- Left grain -->
    <ellipse cx="27" cy="37" rx="8" ry="11"/>
    <!-- Right grain -->
    <ellipse cx="73" cy="37" rx="8" ry="11"/>
    <!-- Roots -->
    <line x1="50" y1="82" x2="38" y2="92" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="50" y1="82" x2="50" y2="94" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="50" y1="82" x2="62" y2="92" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</svg>